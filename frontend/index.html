<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bulk Doc → Markdown</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Bulk Doc → Markdown</h1>
      <span class="ocr-tag" id="ocr-label" hidden></span>
      <span class="role-badge" id="role-badge" hidden></span>
      <span class="user-info" id="user-info" hidden></span>
      <a class="btn" id="logout-link" href="/logout" hidden>Logout</a>
    </header>

    <label class="drop" id="drop">
      <input type="file" id="picker" multiple>
      <p class="drop-title"><span class="accent">Drop files here</span> or click to choose</p>
      <p class="drop-hint">.pdf .docx .xlsx .csv .txt .md and common images</p>
    </label>

    <ul class="files" id="files"></ul>

    <div class="actions">
      <button class="btn" id="clear" disabled>Clear</button>
      <button class="btn primary" id="convert" disabled>Convert</button>
    </div>

    <div class="banner" id="banner"></div>

    <footer class="page-footer" id="page-footer" hidden>
      <label class="theme-switch">
        <span class="theme-switch-side" data-side="light">Light</span>
        <input type="checkbox" id="theme-switch" class="theme-switch-input" aria-label="Toggle dark mode">
        <span class="theme-switch-track" aria-hidden="true"><span class="theme-switch-thumb"></span></span>
        <span class="theme-switch-side" data-side="dark">Dark</span>
      </label>
    </footer>
  </div>

<script>
// Theme: light is the explicit default (set on <html>). The switch flips
// data-theme between "light" and "dark" — no persistence; refresh resets.
document.getElementById('theme-switch').addEventListener('change', (e) => {
  document.documentElement.dataset.theme = e.target.checked ? 'dark' : 'light';
});

const drop = document.getElementById('drop');
const picker = document.getElementById('picker');
const list = document.getElementById('files');
const convertBtn = document.getElementById('convert');
const clearBtn = document.getElementById('clear');
const banner = document.getElementById('banner');
const ocrLabel = document.getElementById('ocr-label');

let queue = [];

// One authenticated fetch fills the entire header. /health is only used by
// Render's probe, not the UI — keeping the OCR badge tied to /me removes the
// race that left it blank after sign-in.
fetch('/me').then(r => r.ok ? r.json() : null).then(u => {
  if (!u) return;
  if (u.ocr) {
    ocrLabel.textContent = `OCR: ${u.ocr}`;
    ocrLabel.hidden = false;
  }
  if (u.role) {
    const badge = document.getElementById('role-badge');
    badge.textContent = u.role;
    badge.hidden = false;
  }
  const info = document.getElementById('user-info');
  const link = document.getElementById('logout-link');
  info.textContent = u.email || 'Signed in';
  info.hidden = false;
  link.hidden = false;
  if (u.role === 'admin') {
    document.getElementById('page-footer').hidden = false;
  }
}).catch(() => {});

function render() {
  list.innerHTML = '';
  queue.forEach((item) => {
    const li = document.createElement('li');
    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = item.file.name;
    const status = document.createElement('span');
    status.className = `status ${item.status}`;
    status.textContent = item.status;
    li.append(name, status);
    list.appendChild(li);
  });
  convertBtn.disabled = queue.length === 0 || queue.some(q => q.status === 'uploading');
  clearBtn.disabled = queue.length === 0;
}

function addFiles(fileList) {
  for (const file of fileList) {
    queue.push({ file, status: 'pending' });
  }
  render();
}

picker.addEventListener('change', e => addFiles(e.target.files));

['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.add('over');
}));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.remove('over');
}));
drop.addEventListener('drop', e => {
  if (e.dataTransfer?.files?.length) addFiles(e.dataTransfer.files);
});

clearBtn.addEventListener('click', () => {
  queue = [];
  banner.classList.remove('show');
  render();
});

convertBtn.addEventListener('click', async () => {
  banner.classList.remove('show');
  const form = new FormData();
  queue.forEach(q => { q.status = 'uploading'; form.append('files', q.file); });
  render();

  try {
    const res = await fetch('/convert', { method: 'POST', body: form });
    if (res.status === 401) {
      window.location.href = '/sign-in';
      return;
    }
    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { const j = await res.json(); msg = j.error || msg; } catch {}
      throw new Error(msg);
    }
    const blob = await res.blob();
    const stamp = new Date().toISOString().replace(/[:.]/g,'-');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `converted-${stamp}.zip`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    queue.forEach(q => q.status = 'done');
  } catch (err) {
    queue.forEach(q => { if (q.status === 'uploading') q.status = 'failed'; });
    banner.textContent = String(err.message || err);
    banner.classList.add('show');
  } finally {
    render();
  }
});
</script>
</body>
</html>
