services:
  - type: web
    name: bulk-doc-converter
    runtime: docker
    plan: standard
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: docling-cache
      mountPath: /root/.cache/docling
      sizeGB: 1
    envVars:
      - key: OCR
        value: docling
      - key: REDUCTO_API_KEY
        sync: false
      - key: REDUCTO_API_URL
        value: https://platform.reducto.ai
      - key: MAX_UPLOAD_BYTES
        value: "209715200"
      - key: MAX_FILES_PER_JOB
        value: "50"
