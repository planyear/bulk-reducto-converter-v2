services:
  - type: web
    name: bulk-doc-converter
    runtime: docker
    plan: standard
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: OCR
        value: docling
      - key: REDUCTO_API_KEY
        sync: false
      - key: REDUCTO_API_URL
        value: https://platform.reducto.ai
      - key: MAX_UPLOAD_BYTES
        value: "209715200"
      - key: MAX_FILES_PER_JOB
        value: "50"
      - key: PER_FILE_TIMEOUT_S
        value: "300"
      - key: WORKOS_API_KEY
        sync: false
      - key: WORKOS_CLIENT_ID
        sync: false
      - key: WORKOS_REDIRECT_URI
        sync: false
      - key: WORKOS_COOKIE_PASSWORD
        sync: false
      - key: WORKOS_DEFAULT_ORG_ID
        sync: false
      - key: APP_BASE_URL
        sync: false
